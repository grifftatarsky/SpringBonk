databaseChangeLog:
  # Master changelog. Individual changesets live in db/changelog/changes/
  # and are included here in deterministic order. Each change file should
  # contain one or more <changeSet> entries with stable ids, and should
  # NEVER be modified after being applied to a shared environment — new
  # schema work goes into new files.
  - include:
      file: db/changelog/changes/001-initial-schema.yaml
      relativeToChangelogFile: false
  - include:
      file: db/changelog/changes/002-notifications.yaml
      relativeToChangelogFile: false
  - include:
      file: db/changelog/changes/003-user-book-statuses.yaml
      relativeToChangelogFile: false
  - include:
      file: db/changelog/changes/004-reviews.yaml
      relativeToChangelogFile: false
  - include:
      file: db/changelog/changes/005-election-nomination-caps.yaml
      relativeToChangelogFile: false
  - include:
      file: db/changelog/changes/006-book-open-library-id-unique.yaml
      relativeToChangelogFile: false
