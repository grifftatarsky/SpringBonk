reverse-proxy-uri: ${reverse-proxy-scheme}://${reverse-proxy-container-name}

# Production Security: HTTPS-only session cookies with strict SameSite
server:
  servlet:
    session:
      cookie:
        secure: true      # HTTPS only - prevents cookie transmission over HTTP
        http-only: true   # Prevents JavaScript access - mitigates XSS attacks
        same-site: lax    # Prevents CSRF while allowing OAuth redirects
